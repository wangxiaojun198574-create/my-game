<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Zombie Mobile Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; color: #0f0; font-size: 18px; pointer-events: none; text-shadow: 1px 1px #000; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid red; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #msg { position: absolute; top: 30%; left: 50%; transform: translateX(-50%); color: red; font-size: 24px; display: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">KILLS: 0 | HP: 100</div>
    <div id="crosshair"></div>
    <div id="msg">TARGET ELIMINATED!</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. 初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 50, 50);
        light.position.set(0, 5, 0);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x202020));

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- 2. 玩家与武器 ---
        let health = 100, kills = 0;
        camera.position.set(0, 1.6, 5);
        
        const gun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.4), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        camera.add(gun);
        gun.position.set(0.3, -0.25, -0.5);
        scene.add(camera);

        // --- 3. 怪物管理 ---
        const zombies = [];
        const zombieGeo = new THREE.BoxGeometry(1, 2, 1);
        function spawnZombie(z) {
            z.position.set(Math.random() * 40 - 20, 1, -(Math.random() * 30 + 10));
            z.hp = 100; z.visible = true; z.active = true;
        }

        for (let i = 0; i < 6; i++) {
            const z = new THREE.Mesh(zombieGeo, new THREE.MeshStandardMaterial({ color: 0x00ff00 }));
            spawnZombie(z);
            scene.add(z);
            zombies.push(z);
        }

        // --- 4. 手机触控逻辑 ---
        let touchX = 0, touchY = 0, lon = 0, lat = 0;
        let isMovingCamera = false;

        window.addEventListener('touchstart', (e) => {
            isMovingCamera = true;
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
            fire(); // 点击即开火
        });

        window.addEventListener('touchmove', (e) => {
            if (!isMovingCamera) return;
            const deltaX = e.touches[0].clientX - touchX;
            const deltaY = e.touches[0].clientY - touchY;
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;

            lon -= deltaX * 0.2; // 灵敏度
            lat -= deltaY * 0.2;
            lat = Math.max(-85, Math.min(85, lat));
        });

        // --- 5. 射击 ---
        const raycaster = new THREE.Raycaster();
        function fire() {
            // 枪支后坐力
            gun.position.z += 0.1;
            setTimeout(() => gun.position.z = -0.5, 50);

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(zombies);
            if (hits.length > 0) {
                const target = hits[0].object;
                target.hp -= 40;
                target.material.color.set(0xff0000);
                setTimeout(() => target.material.color.set(0x00ff00), 100);
                if (target.hp <= 0) {
                    kills++;
                    target.active = false; target.visible = false;
                    document.getElementById('msg').style.display = 'block';
                    setTimeout(() => { document.getElementById('msg').style.display = 'none'; spawnZombie(target); }, 500);
                }
            }
        }

        // --- 6. 循环 ---
        function animate() {
            requestAnimationFrame(animate);

            // 更新视角
            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            const target = new THREE.Vector3();
            target.setFromSphericalCoords(1, phi, theta).add(camera.position);
            camera.lookAt(target);

            zombies.forEach(z => {
                if (z.active) {
                    const dir = new THREE.Vector3().subVectors(camera.position, z.position).normalize();
                    z.position.x += dir.x * 0.03;
                    z.position.z += dir.z * 0.03;
                    if (z.position.distanceTo(camera.position) < 2) health -= 0.2;
                }
            });

            document.getElementById('ui').innerText = `KILLS: ${kills} | HP: ${Math.ceil(health)}`;
            if (health <= 0) { alert("YOU DIED!"); location.reload(); }
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
